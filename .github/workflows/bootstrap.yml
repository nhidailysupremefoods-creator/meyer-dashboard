name: Bootstrap

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decode and extract project
        run: |
          cat ./project.b64 | tr -d '\n' | base64 --decode | tar -xz
          find . -not -path './.git/*' -type f | sort | head -80

      - name: Commit extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Bootstrap: extract Next.js project files"
          git push
