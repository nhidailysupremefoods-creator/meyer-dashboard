name: Bootstrap
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Decode and extract project
        run: |
          echo "File size: $(wc -c < ./project.b64)"
          echo "First 40 chars: $(head -c 40 ./project.b64)"
          echo "---"
          cat ./project.b64 | tr -d '\r\n\t ' | base64 --decode > /tmp/proj.tar.gz
          echo "Decoded size: $(wc -c < /tmp/proj.tar.gz)"
          echo "MD5: $(md5sum /tmp/proj.tar.gz)"
          echo "Type: $(file /tmp/proj.tar.gz)"
          tar -xzf /tmp/proj.tar.gz
          find . -not -path './.git/*' -type f | sort | head -80
      - name: Commit extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Bootstrap: extract Next.js project files"
          git push
