name: Bootstrap
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix and decode project
        run: |
          echo "File size: $(wc -c < ./project.b64)"
          python3 -c "s=open('./project.b64').read().strip(); ok=len(s)==48592 and s[45399]=='E' and s[45400]=='I'; fixed=s[:45399]+'IE'+s[45401:] if ok else s; open('./project.b64','w').write(fixed); print('Fix applied:',ok,'chars:',repr(fixed[45396:45403]))"
          cat ./project.b64 | tr -d '\r\n\t ' | base64 --decode > /tmp/proj.tar.gz
          echo "MD5: $(md5sum /tmp/proj.tar.gz)"
          tar -xzf /tmp/proj.tar.gz
          find . -not -path './.git/*' -type f | sort | head -80
      - name: Commit extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Bootstrap: extract Next.js project files"
          git push
